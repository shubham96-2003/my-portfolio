<nav class="navbar navbar-expand-lg sticky-top portfolio-navbar" [class.scrolled]="isScrolled()">
  <div class="container py-2">
    <button class="brand-button" type="button" (click)="goToSection('home')">
      <span class="brand-mark">S</span>
      <span class="brand-copy">
        <strong>Shubham Ashok Vitukade</strong>
        <small>Frontend Developer</small>
      </span>
    </button>

    <button class="navbar-toggler border-0 shadow-none menu-toggle-btn" type="button" [attr.aria-expanded]="isMenuOpen()"
      aria-label="Toggle navigation" (click)="toggleMenu()" [class.open]="isMenuOpen()">
      <span class="hamburger-line top-line"></span>
      <span class="hamburger-line middle-line"></span>
      <span class="hamburger-line bottom-line"></span>
    </button>

    <div class="collapse navbar-collapse" [class.show]="isMenuOpen()">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
        @for (link of links; track link.id) {
        <li class="nav-item">
          <button class="nav-link" type="button" (click)="goToSection(link.id)">
            {{ link.label }}
          </button>
        </li>
        }
      </ul>
    </div>
  </div>
</nav>
