<section class="section hero-section">
  <div class="container">
    <div class="row align-items-center g-5">
      <div class="col-lg-7">
        <div class="hero-copy fade-up">
          <p class="eyebrow">Available for frontend opportunities</p>
          <h1>Shubham Ashok Vitukade</h1>
          <h2>Frontend Developer</h2>
          <p class="lead">
            Enthusiastic B.Sc. Computer Science graduate building responsive, user-friendly web
            applications using HTML, CSS, AngularJS, and modern frontend tools.
          </p>
          <div class="hero-actions fade-up-delay">
            <button
              mat-flat-button
              color="primary"
              class="pill-button"
              type="button"
              (click)="viewProjects.emit()"
            >
              View Projects
            </button>
            <a
              mat-stroked-button
              class="pill-button"
              href="assets/resume.pdf"
              download="Shubham-Ashok-Vitukade-Resume.pdf"
            >
              Download Resume
            </a>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="hero-visual glass-card fade-up-delay">
          <img
            src="assets/images/profile-photo.webp"
            alt="Profile photo of Shubham Ashok Vitukade"
            class="profile-image"
          />
        </div>
      </div>
    </div>
  </div>
</section>
