<section class="section">
  <div class="container">
    <div class="section-header fade-up">
      <h2 class="section-title">Skills</h2>
      <p class="section-copy">Tools and technologies I use to build clean user interfaces.</p>
    </div>

    <div class="row g-4">
      @for (skill of skills; track skill.name) {
        <div class="col-sm-6 col-lg-4">
          <mat-card class="skill-card h-100">
            <mat-card-content>
              <mat-icon>{{ skill.icon }}</mat-icon>
              <h3>{{ skill.name }}</h3>
            </mat-card-content>
          </mat-card>
        </div>
      }
    </div>
  </div>
</section>
